<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Ayarları - Üye Portalı</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../logo.webp">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="portal-container">
        <!-- Sidebar -->
        <aside class="portal-sidebar">
            <div class="brand">
                <img src="../logo.webp" alt="Dernek Logo">
                <span>Üye Portalı</span>
            </div>
            
            <ul class="portal-menu">
                <li class="portal-menu-item">
                    <a href="dashboard.html"><i class="fa-solid fa-gauge"></i> Kontrol Paneli</a>
                </li>
                <li class="portal-menu-item active">
                    <a href="profile.html"><i class="fa-solid fa-user-gear"></i> Profil Bilgilerim</a>
                </li>
                <li class="portal-menu-item">
                    <a href="../index.html"><i class="fa-solid fa-house"></i> Ana Sayfaya Dön</a>
                </li>
            </ul>
            
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <i class="fa-solid fa-user-circle"></i>
                    <div class="user-details">
                        <span class="user-name">Yükleniyor...</span>
                        <span class="user-role">Üye</span>
                    </div>
                </div>
                <ul class="portal-menu">
                    <li class="portal-menu-item">
                        <a href="#" id="logoutBtn" style="color: #f87171;"><i class="fa-solid fa-arrow-right-from-bracket"></i> Çıkış Yap</a>
                    </li>
                </ul>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="portal-main">
            <!-- Header -->
            <header class="portal-header">
                <h1>Profil Bilgilerim</h1>
                <div class="header-right">
                    <button class="theme-toggle-btn" id="themeTogglePortal" title="Gece Modu">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div class="portal-content" style="max-width: 800px;">
                <div class="portal-card">
                    <h3><i class="fa-solid fa-user-pen" style="color: var(--primary);"></i> Profilini Güncelle</h3>
                    <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 24px;">
                        Kayıtlı iletişim ve üyelik bilgilerinizi buradan düzenleyebilirsiniz.
                    </p>
                    
                    <div class="alert-success" id="profileAlert">
                        <i class="fa-solid fa-circle-check"></i> Profil bilgileriniz başarıyla güncellenmiştir.
                    </div>
                    
                    <form id="profileForm" class="portal-form">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="pName">Ad Soyad</label>
                                <input type="text" id="pName" class="form-control" required>
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="pPhone">Telefon Numarası</label>
                                <input type="text" id="pPhone" class="form-control" required>
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="pEmail">E-posta Adresi (Giriş Kullanıcı Adı)</label>
                                <input type="email" id="pEmail" class="form-control" readonly style="background-color: var(--bg-color); cursor: not-allowed; opacity: 0.7;">
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="pEducation">Eğitim Durumu</label>
                                <select id="pEducation" class="form-control">
                                    <option value="İlkokul">İlkokul</option>
                                    <option value="Ortaokul">Ortaokul</option>
                                    <option value="Lise">Lise</option>
                                    <option value="Ön Lisans">Ön Lisans</option>
                                    <option value="Lisans">Lisans</option>
                                    <option value="Lisansüstü">Lisansüstü</option>
                                </select>
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="pDisabilityType">Engel Tanısı (Salt-Okunur)</label>
                                <input type="text" id="pDisabilityType" class="form-control" readonly style="background-color: var(--bg-color); cursor: not-allowed; opacity: 0.7;">
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="pDisabilityRatio">Engel Oranı % (Salt-Okunur)</label>
                                <input type="text" id="pDisabilityRatio" class="form-control" readonly style="background-color: var(--bg-color); cursor: not-allowed; opacity: 0.7;">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="pAddress">Açık İkamet Adresi</label>
                            <textarea id="pAddress" class="form-control" rows="3" required></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary" style="padding: 12px 32px;"><i class="fa-solid fa-save"></i> Kaydet</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../js/auth-shared.js"></script>
    <script src="script.js"></script>
</body>
</html>
